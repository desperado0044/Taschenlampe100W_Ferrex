[env:bluepill]
platform = ststm32
board = bluepill_f103c8
framework = arduino

; Flashen über ST-Link/STM32-Programmer statt seriellem Bootloader.
; upload_protocol=stlink (OpenOCDs interface/stlink.cfg) erzwingt das veraltete hla_swd-
; Protokoll, das dieser Clone nicht unterstützt ("Debug adapter doesn't support 'hla_swd'
; transport"). Daher direkt über interface/stlink-dap.cfg (native SWD-Transport) flashen.
upload_protocol = custom
upload_command = openocd -f interface/stlink.cfg -c "transport select swd" -f target/stm32f1x.cfg -c "program {$SOURCE} 0x08000000 verify reset exit"
debug_tool = stlink

monitor_speed = 115200

; newlib-nano (Standard-Linker-Spec dieses Cores) linkt Float-Unterstützung für
; printf/snprintf standardmäßig nicht mit ("%f" gibt sonst nichts aus) - explizit anfordern.
;
; TFT_eSPI wird komplett über Build-Flags konfiguriert (User_Setup.h der Lib bleibt
; unangetastet). Initialisiert diesen Display-Klon korrekt (anders als Adafruit_ST7735)
; und braucht deutlich weniger Flash als Arduino_GFX (58% statt 92%).
build_flags =
    -Wl,-u,_printf_float
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DTFT_CS=PA4
    -DTFT_DC=PB11
    -DTFT_RST=PB10
    -DTFT_MOSI=PA7
    -DTFT_SCLK=PA5
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DSPI_FREQUENCY=4000000

lib_deps =
    bodmer/TFT_eSPI
    paulstoffregen/OneWire
    milesburton/DallasTemperature
